name: CI

# Runs the same gates we check locally on every push/PR to main, so a regression
# (type error, broken build, failing test) is caught automatically before it ships.
# No secrets needed — this never touches the database.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-progress run if a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      # Build first: `next build` generates next-env.d.ts (which declares the
      # image-import types, e.g. *.png) and fully type-checks. The explicit tsc
      # step then runs with those generated types present.
      - name: Build
        run: npm run build

      - name: Typecheck
        run: npx tsc --noEmit
